<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Opções de verde — Comunidade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full space-y-3">
    <h2 class="text-lg font-bold text-slate-800 text-center mb-4">Escolha o verde da comunidade</h2>

    <!-- Opção 1: Green-700 (mais escuro) -->
    <button class="w-full flex items-center gap-2 px-3 py-2 rounded-lg bg-green-100 text-left">
      <div class="w-6 h-6 rounded-full bg-green-700 flex items-center justify-center">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="2" width="18" height="20" rx="2" fill="#22c55e" stroke="white" stroke-width="1.5"/><rect x="6" y="5" width="4.5" height="4.5" rx="1" fill="#86efac"/><rect x="13.5" y="5" width="4.5" height="4.5" rx="1" fill="#86efac"/><rect x="6" y="11.5" width="4.5" height="4.5" rx="1" fill="#86efac"/><rect x="13.5" y="11.5" width="4.5" height="4.5" rx="1" fill="#86efac"/><rect x="8" y="17.5" width="8" height="4" rx="1" fill="#14532d"/></svg>
      </div>
      <div>
        <div class="text-sm font-medium text-slate-700">Comunidades</div>
        <div class="text-xs text-slate-400">Opção 1 — Green-700 (escuro)</div>
      </div>
      <div class="ml-auto w-6 h-3 rounded-full bg-green-700 relative"><div class="w-2.5 h-2.5 bg-white rounded-full absolute top-[1px] right-[1px] shadow-sm"></div></div>
    </button>

    <!-- Opção 2: Emerald-600 -->
    <button class="w-full flex items-center gap-2 px-3 py-2 rounded-lg bg-emerald-100 text-left">

      </div>
      <div>
        <div class="text-sm font-medium text-slate-700">Comunidades</div>
        <div class="text-xs text-slate-400">Opção 2 — Emerald-600</div>
      </div>
      <div class="ml-auto w-6 h-3 rounded-full bg-emerald-600 relative"><div class="w-2.5 h-2.5 bg-white rounded-full absolute top-[1px] right-[1px] shadow-sm"></div></div>
    </button>

    <!-- Opção 3: Green-600 -->
    <button class="w-full flex items-center gap-2 px-3 py-2 rounded-lg bg-green-100 text-left">
      <div class="w-6 h-6 rounded-full bg-green-600 flex items-center justify-center">

      </div>
      <div>
        <div class="text-sm font-medium text-slate-700">Comunidades</div>
        <div class="text-xs text-slate-400">Opção 3 — Green-600</div>
      </div>
      <div class="ml-auto w-6 h-3 rounded-full bg-green-600 relative"><div class="w-2.5 h-2.5 bg-white rounded-full absolute top-[1px] right-[1px] shadow-sm"></div></div>
    </button>

    <!-- Opção 4: Emerald-500 (padrão vibrante) -->

      <div class="w-6 h-6 rounded-full bg-emerald-500 flex items-center justify-center">

    </button>

    <!-- Opção 5: Green-500 (padrão) -->

    <!-- Opção 7: Green-400 (mais claro) -->
    <button class="w-full flex items-center gap-2 px-3 py-2 rounded-lg bg-green-50 text-left">
      <div class="w-6 h-6 rounded-full bg-green-400 flex items-center justify-center">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="2" width="18" height="20" rx="2" fill="#22c55e" stroke="white" stroke-width="1.5"/><rect x="6" y="5" width="4.5" height="4.5" rx="1" fill="#86efac"/><rect x="13.5" y="5" width="4.5" height="4.5" rx="1" fill="#86efac"/><rect x="6" y="11.5" width="4.5" height="4.5" rx="1" fill="#86efac"/><rect x="13.5" y="11.5" width="4.5" height="4.5" rx="1" fill="#86efac"/><rect x="8" y="17.5" width="8" height="4" rx="1" fill="#14532d"/></svg>
      </div>
      <div>
        <div class="text-sm font-medium text-slate-700">Comunidades</div>
        <div class="text-xs text-slate-400">Opção 7 — Green-400 (claro)</div>

    <!-- Opção 8: Emerald-400 (claro vibrante) -->

      <div class="w-6 h-6 rounded-full bg-emerald-400 flex items-center justify-center">

      <div class="w-6 h-6 rounded-full bg-lime-500 flex items-center justify-center">

    </button>

  </div>

</html>
